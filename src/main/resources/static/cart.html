<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - EcoSprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

<!-- Header (UPDATED) -->
<header class="bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/" class="text-3xl font-bold text-green-600">
            EcoSprout
        </a>
        <!-- Main Navigation -->
        <div class="hidden md:flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-green-600">Home</a>
            <a href="/shop.html" class="text-gray-600 hover:text-green-600">Shop</a>
            <a href="/our_mission.html" class="text-gray-600 hover:text-green-600">Our Mission</a>
        </div>
        <!-- Auth/Cart Links -->
        <div class="flex items-center space-x-4" id="auth-links">
            <!-- JS will populate this -->
        </div>
    </nav>
</header>

<!-- Cart Content -->
<main class="container mx-auto px-4 py-12 flex-grow">
    <h1 class="text-3xl font-bold mb-8">Your Shopping Cart</h1>

    <!-- Global Message Bar -->
    <div id="message-bar" class="hidden px-4 py-3 rounded-lg relative mb-6" role="alert">
        <span class="block sm:inline" id="message-text"></span>
    </div>

    <div id="cart-container" class="lg:flex lg:gap-12">

        <!-- Cart Items -->
        <div class="lg:w-2/3" id="cart-items-container">
            <!-- Loading message -->
            <div id="loading-message" class="text-center text-gray-500 py-10">
                Loading your cart...
            </div>
            <!-- Cart items will be injected here -->
        </div>

        <!-- Order Summary -->
        <div class="lg:w-1/3 mt-8 lg:mt-0">
            <div id="summary-box" class="bg-white p-6 rounded-lg shadow-md sticky top-10" style="display: none;">
                <h2 class="text-2xl font-semibold mb-6 border-b pb-4">Order Summary</h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Subtotal</span>
                        <span id="summary-subtotal" class="font-medium">₹0.00</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Shipping</span>
                        <span class="font-medium">FREE</span>
                    </div>
                    <div class="flex justify-between items-center text-lg font-bold pt-4 border-t">
                        <span>Total:</span>
                        <span id="summary-total">₹0.00</span>
                    </div>
                </div>
                <a href="/checkout.html"
                   class="w-full mt-6 block text-center bg-green-600 text-white text-lg font-medium px-8 py-3 rounded-md shadow-lg hover:bg-green-700 transition-colors">
                    Proceed to Checkout
                </a>
            </div>
        </div>

    </div>
</main>

<!-- Footer -->
<footer class="bg-gray-800 text-gray-300 py-12 mt-auto">
    <div class="container mx-auto px-4 text-center">
        <p>&copy; 2025 EcoSprout. All rights reserved.</p>
    </div>
</footer>

<!-- JavaScript (UPDATED) -->
<script>
    // --- JWT & Auth Management (UPDATED) ---
    const token = localStorage.getItem('ecoSproutToken');
    const authLinks = document.getElementById('auth-links');

    function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
    }
    let userRoles = [];
    if (token) {
        const tokenData = parseJwt(token);
        if (tokenData && tokenData.roles) {
            userRoles = tokenData.roles.split(',');
        }
    }
    const isAdmin = userRoles.includes('ROLE_ADMIN');

    // --- NEW HEADER ---
    if (token) {
        let adminLink = isAdmin ? '<a href="/admin.html" class="text-sm font-medium text-red-600 hover:text-red-700">Admin</a>' : '';
        authLinks.innerHTML = `
                ${adminLink}
                <a href="/order_history.html" class="text-sm font-medium text-gray-600 hover:text-green-600">My Orders</a>
                <a href="/wishlist.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </a>
                <a href="/cart.html" class="text-green-600 font-bold"> <!-- Active Link -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/profile.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            `;
    } else {
        window.location.href = '/login.html?redirect=cart';
    }
    // --- END HEADER ---

    function logout() {
        localStorage.removeItem('ecoSproutToken');
        window.location.href = '/';
    }

    const cartItemsContainer = document.getElementById('cart-items-container');
    const loadingMessage = document.getElementById('loading-message');
    const summaryBox = document.getElementById('summary-box');
    const summarySubtotal = document.getElementById('summary-subtotal');
    const summaryTotal = document.getElementById('summary-total');
    const messageBar = document.getElementById('message-bar');
    const messageText = document.getElementById('message-text');

    function showMessage(message, isError = false) {
        messageText.textContent = message;
        if (isError) {
            messageBar.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-6";
        } else {
            messageBar.className = "bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg relative mb-6";
        }
        messageBar.classList.remove('hidden');
        setTimeout(() => {
            messageBar.classList.add('hidden');
        }, 3000);
    }

    function createCartItemRow(item) {
        const product = item.product;
        if (!product) return "";

        const imageUrl = product.imageUrl || 'https://placehold.co/100x100/e2e8f0/94a3b8?text=Eco';
        const maxStock = product.stockQuantity;

        return `
                <div class="flex items-center gap-4 bg-white p-4 rounded-lg shadow-sm mb-4" id="cart-item-row-${product.id}">
                    <div class="w-24 h-24 bg-gray-100 rounded-md overflow-hidden flex-shrink-0">
                        <img src="${imageUrl}" alt="${product.name}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <a href="/product.html?id=${product.id}" class="font-semibold text-lg hover:text-green-600">${product.name}</a>
                        <p class="text-sm text-gray-500">In stock: ${maxStock}</p>
                        <button onclick="removeFromCart(${product.id})" class="text-sm text-red-500 hover:text-red-700 mt-1">
                            Remove
                        </button>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-lg" id="item-total-${product.id}">₹${(item.unitPrice * item.quantity).toFixed(2)}</p>
                        <p class="text-sm text-gray-500">(₹${item.unitPrice.toFixed(2)} each)</p>
                        <div class="flex items-center gap-2 mt-2">
                            <label for="qty-${product.id}" class="text-sm">Qty:</label>
                            <input type="number" id="qty-${product.id}" value="${item.quantity}" min="1" max="${maxStock}"
                                   class="w-16 px-2 py-1 border border-gray-300 rounded-md shadow-sm">
                            <button onclick="updateQuantity(${product.id})" class="text-sm text-white bg-blue-500 px-3 py-1 rounded-md hover:bg-blue-600">
                                Update
                            </button>
                        </div>
                    </div>
                </div>
            `;
    }

    function showEmptyCartMessage() {
        loadingMessage.style.display = 'none';
        summaryBox.style.display = 'none';
        cartItemsContainer.innerHTML = `
                <div class="text-center bg-white p-10 rounded-lg shadow-sm">
                    <h2 class="text-2xl font-semibold">Your cart is empty.</h2>
                    <p class="mt-2 text-gray-600">Looks like you haven't added any eco-friendly products yet!</p>
                    <a href="/shop.html" class="mt-6 inline-block bg-green-600 text-white text-lg font-medium px-8 py-3 rounded-md shadow-lg hover:bg-green-700">
                        Continue Shopping
                    </a>
                </div>
            `;
    }

    async function fetchCart(showSuccessMessage = false) {
        if (!token) return;

        try {
            const response = await fetch('/api/cart', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 204) {
                showEmptyCartMessage();
                return;
            }

            if (response.ok) {
                const cart = await response.json();

                if (cart && cart.orderItems && cart.orderItems.length > 0) {
                    loadingMessage.style.display = 'none';
                    summaryBox.style.display = 'block';
                    cartItemsContainer.innerHTML = '';

                    cart.orderItems.forEach(item => {
                        cartItemsContainer.innerHTML += createCartItemRow(item);
                    });

                    summarySubtotal.textContent = `₹${cart.totalAmount.toFixed(2)}`;
                    summaryTotal.textContent = `₹${cart.totalAmount.toFixed(2)}`;

                    if (showSuccessMessage) {
                        showMessage('Cart updated successfully!', false);
                    }
                } else {
                    showEmptyCartMessage();
                }
            } else if (response.status === 401 || response.status === 403) {
                alert('Your session has expired. Please log in again.');
                logout();
            } else {
                throw new Error(`Server responded with status: ${response.status}`);
            }

        } catch (error) {
            console.error('Failed to fetch cart:', error);
            loadingMessage.innerHTML = `<div class="text-center w-full text-red-500">Error loading cart: ${error.message}</div>`;
        }
    }

    async function updateQuantity(productId) {
        const quantityInput = document.getElementById(`qty-${productId}`);
        const newQuantity = parseInt(quantityInput.value);
        const maxStock = parseInt(quantityInput.max);

        if (isNaN(newQuantity) || newQuantity < 1) {
            showMessage('Quantity must be at least 1.', true);
            quantityInput.value = 1;
            return;
        }
        if (newQuantity > maxStock) {
            showMessage(`Not enough stock. Only ${maxStock} available.`, true);
            quantityInput.value = maxStock;
            return;
        }

        const payload = { productId: productId, quantity: newQuantity };

        try {
            const response = await fetch('/api/cart/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const updatedCart = await response.json();
                summarySubtotal.textContent = `₹${updatedCart.totalAmount.toFixed(2)}`;
                summaryTotal.textContent = `₹${updatedCart.totalAmount.toFixed(2)}`;

                const updatedItem = updatedCart.orderItems.find(item => item.product.id === productId);
                if (updatedItem) {
                    document.getElementById(`item-total-${productId}`).textContent = `₹${(updatedItem.unitPrice * updatedItem.quantity).toFixed(2)}`;
                }

                showMessage('Quantity updated!', false);
            } else {
                const errorData = await response.json();
                showMessage(errorData.message || 'Failed to update quantity.', true);
                fetchCart();
            }
        } catch (error) {
            console.error('Update quantity error:', error);
            showMessage('An error occurred. Please try again.', true);
        }
    }

    async function removeFromCart(productId) {
        if (!token) return;
        if (!confirm("Are you sure you want to remove this item?")) return;

        const payload = { productId: productId };

        try {
            const response = await fetch('/api/cart/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const updatedCart = await response.json();
                const rowToRemove = document.getElementById(`cart-item-row-${productId}`);
                if (rowToRemove) rowToRemove.remove();

                summarySubtotal.textContent = `₹${updatedCart.totalAmount.toFixed(2)}`;
                summaryTotal.textContent = `₹${updatedCart.totalAmount.toFixed(2)}`;

                if (!updatedCart.orderItems || updatedCart.orderItems.length === 0) {
                    showEmptyCartMessage();
                } else {
                    showMessage('Item removed from cart.', false);
                }
            } else {
                alert('Failed to remove item. Please try again.');
            }
        } catch (error) {
            console.error('Remove from cart error:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', fetchCart);
</script>
</body>
</html>
