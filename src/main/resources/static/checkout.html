<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - EcoSprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Header (UPDATED) -->
<header class="bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/" class="text-3xl font-bold text-green-600">
            EcoSprout
        </a>
        <!-- Main Navigation -->
        <div class="hidden md:flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-green-600">Home</a>
            <a href="/shop.html" class="text-gray-600 hover:text-green-600">Shop</a>
            <a href="/our_mission.html" class="text-gray-600 hover:text-green-600">Our Mission</a>
        </div>
        <!-- Auth/Cart Links -->
        <div class="flex items-center space-x-4" id="auth-links">
            <!-- JS will populate this -->
        </div>
    </nav>
</header>

<!-- Checkout Content -->
<main class="container mx-auto px-4 py-12">
    <div class="flex flex-col lg:flex-row-reverse lg:gap-12">

        <!-- Order Summary (Right side) -->
        <div class="lg:w-1/3">
            <div class="bg-white p-6 rounded-lg shadow-md sticky top-10">
                <h2 class="text-2xl font-semibold mb-6 border-b pb-4">Your Order</h2>
                <div id="summary-items" class="space-y-4 max-h-64 overflow-y-auto pr-2">
                    <!-- Summary items injected here -->
                </div>
                <div class="space-y-3 mt-6 pt-6 border-t">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Subtotal</span>
                        <span id="summary-subtotal" class="font-medium">₹0.00</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Shipping</span>
                        <span class="font-medium">FREE</span>
                    </div>
                    <div class="flex justify-between items-center text-lg font-bold pt-4 border-t">
                        <span>Total:</span>
                        <span id="summary-total">₹0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shipping Form (Left side) -->
        <div class="lg:w-2/3 mt-8 lg:mt-0">
            <form id="checkout-form" class="bg-white p-8 rounded-lg shadow-md space-y-6">
                <h2 class="text-2xl font-semibold mb-4">Shipping Information</h2>

                <!-- Error Message Bar -->
                <div id="message-bar" class="hidden px-4 py-3 rounded-lg relative" role="alert">
                    <span class="block sm:inline" id="message-text"></span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
                        <input type="text" id="firstName" required
                               class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
                        <input type="text" id="lastName" required
                               class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>

                <div>
                    <label for="addressLine1" class="block text-sm font-medium text-gray-700">Address Line 1</label>
                    <input type="text" id="addressLine1" required
                           class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                </div>
                <div>
                    <label for="addressLine2" class="block text-sm font-medium text-gray-700">Address Line 2 (Optional)</label>
                    <input type="text" id="addressLine2"
                           class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700">City</label>
                        <input type="text" id="city" required
                               class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="postalCode" class="block text-sm font-medium text-gray-700">Postal Code</label>
                        <input type="text" id="postalCode" required
                               class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                    </div>
                    <div>
                        <label for="country" class="block text-sm font-medium text-gray-700">Country</label>
                        <input type="text" id="country" required
                               class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>

                <!-- Payment Section (Mock) -->
                <div class="pt-6 border-t">
                    <h2 class="text-2xl font-semibold mb-4">Payment</h2>
                    <div class="bg-gray-100 p-4 rounded-md">
                        <p class="text-gray-600">In a real store, a credit card form (Stripe/PayPal) would go here. For this project, we'll just place the order.</p>
                    </div>
                </div>

                <button type="submit"
                        id="place-order-btn"
                        class="w-full px-8 py-3 text-lg font-medium text-white bg-green-600 border border-transparent rounded-md shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                    Place Order
                </button>
            </form>
        </div>
    </div>
</main>

<!-- JavaScript (UPDATED) -->
<script>
    // --- JWT & Auth Management (UPDATED) ---
    const token = localStorage.getItem('ecoSproutToken');
    const authLinks = document.getElementById('auth-links');

    function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
    }
    let userRoles = [];
    if (token) {
        const tokenData = parseJwt(token);
        if (tokenData && tokenData.roles) {
            userRoles = tokenData.roles.split(',');
        }
    }
    const isAdmin = userRoles.includes('ROLE_ADMIN');

    // --- NEW HEADER ---
    if (token) {
        let adminLink = isAdmin ? '<a href="/admin.html" class="text-sm font-medium text-red-600 hover:text-red-700">Admin</a>' : '';
        authLinks.innerHTML = `
                ${adminLink}
                <a href="/order_history.html" class="text-sm font-medium text-gray-600 hover:text-green-600">My Orders</a>
                <a href="/wishlist.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </a>
                <a href="/cart.html" class="text-gray-600 hover:text-green-600"> <!-- Active -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/profile.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            `;
    } else {
        window.location.href = '/login.html?redirect=checkout';
    }
    // --- END HEADER ---

    function logout() {
        localStorage.removeItem('ecoSproutToken');
        window.location.href = '/';
    }

    const summaryItems = document.getElementById('summary-items');
    const summarySubtotal = document.getElementById('summary-subtotal');
    const summaryTotal = document.getElementById('summary-total');
    const checkoutForm = document.getElementById('checkout-form');
    const placeOrderBtn = document.getElementById('place-order-btn');
    const messageBar = document.getElementById('message-bar');
    const messageText = document.getElementById('message-text');

    function showMessage(message, isError = false) {
        messageText.textContent = message;
        if (isError) {
            messageBar.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative";
        } else {
            messageBar.className = "bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg relative";
        }
        messageBar.classList.remove('hidden');
    }

    async function fetchCartSummary() {
        if (!token) return;

        try {
            const response = await fetch('/api/cart', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 204) {
                alert('Your cart is empty. Redirecting to shop...');
                window.location.href = '/shop.html';
                return;
            }

            if (response.ok) {
                const cart = await response.json();

                if (cart && cart.orderItems && cart.orderItems.length > 0) {
                    summaryItems.innerHTML = '';
                    cart.orderItems.forEach(item => {
                        summaryItems.innerHTML += `
                                <div class="flex justify-between items-center text-sm">
                                    <div class="flex items-center gap-2">
                                        <img src="${item.product.imageUrl || 'https://placehold.co/64x64/e2e8f0/94a3b8?text=Eco'}" alt="${item.product.name}" class="w-10 h-10 rounded-md object-cover">
                                        <span>${item.product.name} <span class="text-gray-500">x ${item.quantity}</span></span>
                                    </div>
                                    <span class="font-medium">₹${(item.unitPrice * item.quantity).toFixed(2)}</span>
                                </div>
                            `;
                    });

                    summarySubtotal.textContent = `₹${cart.totalAmount.toFixed(2)}`;
                    summaryTotal.textContent = `₹${cart.totalAmount.toFixed(2)}`;
                } else {
                    alert('Your cart is empty. Redirecting to shop...');
                    window.location.href = '/shop.html';
                }
            } else if (response.status === 401 || response.status === 403) {
                logout();
            } else {
                throw new Error(`Server responded with status: ${response.status}`);
            }

        } catch (error) {
            console.error('Failed to fetch cart summary:', error);
            showMessage(error.message, true);
        }
    }

    async function fetchProfileForAddress() {
        try {
            const response = await fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!response.ok) return;

            const user = await response.json();

            if (user.firstName) document.getElementById('firstName').value = user.firstName;
            if (user.lastName) document.getElementById('lastName').value = user.lastName;
            if (user.addressLine1) document.getElementById('addressLine1').value = user.addressLine1;
            if (user.addressLine2) document.getElementById('addressLine2').value = user.addressLine2;
            if (user.city) document.getElementById('city').value = user.city;
            if (user.postalCode) document.getElementById('postalCode').value = user.postalCode;
            if (user.country) document.getElementById('country').value = user.country;

        } catch (error) {
            console.error("Fetch profile error:", error);
        }
    }

    checkoutForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        placeOrderBtn.disabled = true;
        placeOrderBtn.textContent = 'Placing Order...';
        placeOrderBtn.classList.add('bg-gray-400');

        const shippingDetails = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            addressLine1: document.getElementById('addressLine1').value,
            addressLine2: document.getElementById('addressLine2').value,
            city: document.getElementById('city').value,
            postalCode: document.getElementById('postalCode').value,
            country: document.getElementById('country').value,
        };

        try {
            const response = await fetch('/api/cart/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(shippingDetails)
            });

            const responseData = await response.json();

            if (response.ok) {
                window.location.href = `/order_confirmation.html?orderId=${responseData.id}`;
            } else {
                throw new Error(responseData.message || 'Failed to place order.');
            }
        } catch (error) {
            console.error('Checkout error:', error);
            showMessage(error.message, true);
            placeOrderBtn.disabled = false;
            placeOrderBtn.textContent = 'Place Order';
            placeOrderBtn.classList.remove('bg-gray-400');
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        fetchCartSummary();
        fetchProfileForAddress();
    });
</script>
</body>
</html>
