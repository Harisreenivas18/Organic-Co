<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EcoSprout</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">

    <div class="text-center">
        <a href="/" class="text-3xl font-bold text-green-600">
            EcoSprout
        </a>

        <h2 class="mt-2 text-2xl font-semibold text-gray-900">
            Create your account
        </h2>

        <p class="mt-1 text-sm text-gray-600">
            Or
            <a href="/login.html"
               class="font-medium text-green-600 hover:text-green-500">
                sign in to your account
            </a>
        </p>
    </div>

    <!-- Registration Form -->
    <form id="registerForm" class="space-y-4">

        <div>
            <label for="username"
                   class="block text-sm font-medium text-gray-700">
                Username
            </label>

            <input
                    id="username"
                    name="username"
                    type="text"
                    required
                    class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="email"
                   class="block text-sm font-medium text-gray-700">
                Email address
            </label>

            <input
                    id="email"
                    name="email"
                    type="email"
                    required
                    class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <label for="password"
                   class="block text-sm font-medium text-gray-700">
                Password
            </label>

            <input
                    id="password"
                    name="password"
                    type="password"
                    required
                    class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
        </div>

        <div>
            <button
                    type="submit"
                    class="w-full px-4 py-2 text-sm font-medium text-white bg-green-600 border border-transparent rounded-md shadow-sm hover:bg-green-700">

                Create Account
            </button>
        </div>

    </form>

    <!-- Message -->
    <div id="message" class="text-sm text-center"></div>

</div>

<script>

    document.getElementById('registerForm')
        .addEventListener('submit', async function(event) {

            event.preventDefault();

            const username =
                document.getElementById('username').value;

            const email =
                document.getElementById('email').value;

            const password =
                document.getElementById('password').value;

            const messageEl =
                document.getElementById('message');

            // REQUEST OBJECT
            const registrationRequest = {

                username: username,
                email: email,
                password: password
            };

            try {

                const response = await fetch(
                    'http://localhost:8081/api/auth/register',
                    {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify(registrationRequest)
                    }
                );

                const responseBody = await response.text();

                if (response.ok) {

                    messageEl.textContent =
                        'Account created successfully! Redirecting to login...';

                    messageEl.className =
                        'text-green-600';

                    setTimeout(() => {

                        window.location.href =
                            '/login.html';

                    }, 2000);

                } else {

                    messageEl.textContent =
                        responseBody;

                    messageEl.className =
                        'text-red-600';
                }

            } catch (error) {

                console.error('Registration error:', error);

                messageEl.textContent =
                    'An error occurred during registration.';

                messageEl.className =
                    'text-red-600';
            }
        });

</script>

</body>
</html>
