<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - EcoSprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Header (UPDATED) -->
<header class="bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/" class="text-3xl font-bold text-green-600">
            EcoSprout
        </a>
        <!-- Main Navigation -->
        <div class="hidden md:flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-green-600">Home</a>
            <a href="/shop.html" class="text-gray-600 hover:text-green-600">Shop</a>
            <a href="/our_mission.html" class="text-gray-600 hover:text-green-600">Our Mission</a>
        </div>
        <div class="hidden md:block flex-1 max-w-sm mx-4">
            <div class="flex items-center">
                <input type="text"
                       id="search-input"
                       placeholder="Search products..."
                       class="w-full px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent">
                <button onclick="handleSearch()"
                        class="bg-green-600 text-white px-4 py-2 rounded-r-lg hover:bg-green-700 transition duration-300">
                    Search
                </button>
            </div>
        </div>
        <!-- Auth/Cart Links -->
        <div class="flex items-center space-x-4" id="auth-links">
            <!-- JS will populate this -->
        </div>
    </nav>
</header>

<!-- Product Details Content -->
<main class="container mx-auto px-4 py-12">
    <!-- Success/Error Message Bar -->
    <div id="message-bar" class="hidden px-4 py-3 rounded-lg relative mb-6" role="alert">
        <span class="block sm:inline" id="message-text"></span>
    </div>

    <div id="product-details-container" class="bg-white p-8 rounded-lg shadow-md flex flex-col md:flex-row gap-8">
        <!-- Loading placeholder -->
        <div id="loading-message" class="w-full text-center py-16 text-gray-500">
            Loading product details...
        </div>
        <!-- Product content will be injected here -->
    </div>
</main>

<!-- JavaScript (UPDATED) -->
<script>
    // --- JWT & Auth Management (UPDATED) ---
    const token = localStorage.getItem('ecoSproutToken');
    const authLinks = document.getElementById('auth-links');

    function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
    }
    let userRoles = [];
    if (token) {
        const tokenData = parseJwt(token);
        if (tokenData && tokenData.roles) {
            userRoles = tokenData.roles.split(',');
        }
    }
    const isAdmin = userRoles.includes('ROLE_ADMIN');

    // --- NEW HEADER ---
    if (token) {
        let adminLink = isAdmin ? '<a href="/admin.html" class="text-sm font-medium text-red-600 hover:text-red-700">Admin</a>' : '';
        authLinks.innerHTML = `
                ${adminLink}
                <a href="/order_history.html" class="text-sm font-medium text-gray-600 hover:text-green-600">My Orders</a>
                <a href="/wishlist.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </a>
                <a href="/cart.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/profile.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            `;
    } else {
        authLinks.innerHTML = `
                <a href="/wishlist.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </a>
                <a href="/cart.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/login.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            `;
    }
    // --- END HEADER ---

    function logout() {
        localStorage.removeItem('ecoSproutToken');
        window.location.href = '/';
    }

    const messageBar = document.getElementById('message-bar');
    const messageText = document.getElementById('message-text');

    function showMessage(message, isError = false) {
        messageText.textContent = message;
        if (isError) {
            messageBar.className = "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative mb-6";
        } else {
            messageBar.className = "bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg relative mb-6";
        }
        messageBar.classList.remove('hidden');
        setTimeout(() => {
            messageBar.classList.add('hidden');
        }, 3000);
    }

    const productContainer = document.getElementById('product-details-container');
    const loadingMessage = document.getElementById('loading-message');
    let currentProductId = null;
    let wishlistProductIds = new Set(); // <-- NEW

    function renderProduct(product) {
        currentProductId = product.id;
        const categoryName = product.categories.length > 0 ? product.categories[0].name : 'General';
        const imageUrl = product.imageUrl ? product.imageUrl : 'https://placehold.co/600x600/e2e8f0/94a3b8?text=EcoSprout';

        // --- NEW: Wishlist Heart Logic ---
        const isWishlisted = wishlistProductIds.has(product.id);
        const heartIconHtml = `
                <button onclick="toggleWishlist(${product.id}, event)" class="absolute top-4 right-4 p-2 bg-white/70 rounded-full text-gray-700 hover:bg-white"
                        id="wishlist-btn-${product.id}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                         fill="${isWishlisted ? '#EF4444' : 'none'}"
                         stroke="${isWishlisted ? '#EF4444' : 'currentColor'}"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                         <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                    </svg>
                </button>
            `;
        // --- END NEW ---

        let stockHtml = '';
        let actionHtml = '';

        if (product.stockQuantity > 0) {
            stockHtml = `<p class="text-sm text-gray-500 mt-4">Stock: ${product.stockQuantity} available</p>`;
            actionHtml = `
                    <div class="mt-8">
                        <button onclick="addToCart()" class="w-full bg-green-600 text-white text-lg font-medium px-8 py-3 rounded-md shadow-lg hover:bg-green-700 transition-colors">
                            Add to Cart
                        </button>
                    </div>
                `;
        } else {
            stockHtml = `<p class="text-lg font-medium text-red-500 mt-4">Out of Stock</p>`;
            actionHtml = `
                    <div class="mt-8">
                        <button class="w-full bg-gray-400 text-white text-lg font-medium px-8 py-3 rounded-md shadow-lg cursor-not-allowed" disabled>
                            Out of Stock
                        </button>
                    </div>
                `;
        }

        productContainer.innerHTML = `
                <!-- Product Image -->
                <div class="md:w-1/2 relative"> <!-- Added relative -->
                    <div class="w-full h-96 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden">
                        <img src="${imageUrl}" alt="${product.name}" class="w-full h-full object-cover"
                             onerror="this.src='https://placehold.co/600x600/e2e8f0/94a3b8?text=Image+Not+Found'">
                    </div>
                    ${heartIconHtml} <!-- Added heart button -->
                </div>

                <!-- Product Info -->
                <div class="md:w-1/2 flex flex-col justify-center">
                    <span class="text-sm text-gray-500 uppercase">${categoryName}</span>
                    <h1 class="text-4xl font-bold mt-2">${product.name}</h1>
                    <span class="text-3xl font-bold text-green-600 mt-4">₹${product.price.toFixed(2)}</span>
                    <p class="text-gray-700 mt-6">${product.description}</p>
                    ${stockHtml}
                    ${actionHtml}
                </div>
            `;
    }

    // --- NEW: Fetch Wishlist IDs ---
    async function fetchWishlistIds() {
        if (!token) return;
        try {
            const response = await fetch('/api/wishlist/ids', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const ids = await response.json();
                wishlistProductIds = new Set(ids);
            }
        } catch (error) {
            console.error('Failed to fetch wishlist IDs:', error);
        }
    }
    // --- END NEW FUNCTION ---

    async function fetchProduct() {
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');

        if (!productId) {
            loadingMessage.innerHTML = '<div class="text-center w-full text-red-500">Error: No product ID specified.</div>';
            return;
        }

        try {
            // --- UPDATED to fetch wishlist first ---
            await fetchWishlistIds();

            const response = await fetch(`/api/products/${productId}`);
            if (!response.ok) throw new Error(`Product not found (404)`);
            const product = await response.json();
            renderProduct(product);
        } catch (error) {
            console.error('Failed to fetch product:', error);
            loadingMessage.innerHTML = `<div class="text-center w-full text-red-500">Error loading product: ${error.message}</div>`;
        }
    }

    async function addToCart() {
        if (!currentProductId) return;
        if (!token) {
            window.location.href = `/login.html?redirect=product&id=${currentProductId}`;
            return;
        }
        const payload = { productId: currentProductId, quantity: 1 };
        try {
            const response = await fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                showMessage('Success! Product added to cart.', false);
            } else {
                const errorData = await response.json();
                showMessage(errorData.message || 'Error adding to cart', true);
            }
        } catch (error) {
            showMessage('An error occurred. Please try again.', true);
        }
    }

    // --- NEW: Toggle Wishlist Function ---
    async function toggleWishlist(productId, event) {
        event.preventDefault();
        event.stopPropagation();
        if (!token) {
            window.location.href = `/login.html?redirect=product&id=${productId}`;
            return;
        }
        const button = document.getElementById(`wishlist-btn-${productId}`);
        const svg = button.querySelector('svg');
        try {
            const response = await fetch('/api/wishlist/toggle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ productId: productId })
            });
            if (response.ok) {
                const data = await response.json();
                if (data.isWishlisted) {
                    svg.setAttribute('fill', '#EF4444'); // red-500
                    svg.setAttribute('stroke', '#EF4444');
                    showMessage('Added to wishlist!', false);
                } else {
                    svg.setAttribute('fill', 'none');
                    svg.setAttribute('stroke', 'currentColor');
                    showMessage('Removed from wishlist.', false);
                }
            } else { throw new Error('Failed to update wishlist'); }
        } catch (error) {
            console.error('Toggle wishlist error:', error);
            showMessage(error.message, true);
        }
    }
    // --- END NEW FUNCTION ---

    document.addEventListener('DOMContentLoaded', fetchProduct);
    async function handleSearch() {
    const keyword = document.getElementById('search-input').value;
    const productList = document.getElementById('product-list');

    productList.innerHTML = '<div class="text-center col-span-4 text-gray-500">Searching...</div>';

    try {
        const response = await fetch(`/api/products?keyword=${encodeURIComponent(keyword)}`);
        if (!response.ok) throw new Error('Search failed');

        const products = await response.json();
        productList.innerHTML = '';

        if (products.length > 0) {
            products.forEach(product => {
                productList.innerHTML += createProductCard(product);
            });
        } else {
            productList.innerHTML = '<div class="text-center col-span-4 text-gray-500">No products match your search.</div>';
        }
    } catch (error) {
        console.error('Search error:', error);
        showMessage('Error performing search', true);
    }
}

// Optional: Allow pressing "Enter" to search
document.getElementById('search-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        handleSearch();
    }
});
</script>
</body>
</html>
