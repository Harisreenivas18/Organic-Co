<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EcoSprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Simple modal styles */
        #edit-categories-modal {
            background: rgba(0, 0, 0, 0.5);
        }
        /* Styles for active tab */
        .tab-btn.active {
            border-bottom-color: #10B981; /* green-500 */
            color: #065F46; /* green-800 */
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Header (UPDATED) -->
<header class="bg-white shadow-sm">
    <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/" class="text-3xl font-bold text-green-600">
            EcoSprout
        </a>
        <!-- Main Navigation -->
        <div class="hidden md:flex items-center space-x-6">
            <a href="/" class="text-gray-600 hover:text-green-600">Home</a>
            <a href="/shop.html" class="text-gray-600 hover:text-green-600">Shop</a>
            <a href="/our_mission.html" class="text-gray-600 hover:text-green-600">Our Mission</a>
        </div>
        <div class="hidden md:block flex-1 max-w-sm mx-4">
            <div class="flex items-center">
                <input type="text"
                       id="search-input"
                       placeholder="Search products..."
                       class="w-full px-4 py-2 border border-gray-300 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-green-600 focus:border-transparent">
                <button onclick="handleSearch()"
                        class="bg-green-600 text-white px-4 py-2 rounded-r-lg hover:bg-green-700 transition duration-300">
                    Search
                </button>
            </div>
        </div>
        <!-- Auth/Cart Links (Will be populated by JS) -->
        <div class="flex items-center space-x-4" id="auth-links">
            Loading...
        </div>
    </nav>
</header>

<!-- Admin Content -->
<main class="container mx-auto px-4 py-12 flex-grow">

    <!-- Page Title & Global Message -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Admin Dashboard</h1>
        <div id="global-message" class="text-sm font-medium"></div>
    </div>

    <!-- Sub-Navigation Tabs -->
    <div class="border-b border-gray-200 mb-8">
        <nav class="-mb-px flex space-x-8" aria-label="Tabs">
            <button id="tab-products" onclick="showTab('products')" class="tab-btn active whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                Product Management
            </button>
            <button id="tab-categories" onclick="showTab('categories')" class="tab-btn whitespace-nowrap py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 font-medium text-sm">
                Category Management
            </button>
        </nav>
    </div>

    <!-- Products Tab Content -->
    <div id="products-tab-content">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Left Side: Manage Existing Products -->
            <div class="lg:w-2/3">
                <h2 class="text-2xl font-semibold mb-6">Existing Products</h2>
                <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                    <table class="w-full text-left min-w-[600px]">
                        <thead>
                        <tr class="border-b">
                            <th class="py-2">Product</th>
                            <th class="py-2">Stock</th>
                            <th class="py-2">Categories</th>
                            <th class="py-2">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="product-list">
                        <!-- Product rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Right Side: Create New Product -->
            <div class="lg:w-1/3">
                <div class="w-full bg-white p-8 rounded-lg shadow-md sticky top-10">
                    <h2 class="text-2xl font-semibold mb-6">Create New Product</h2>
                    <form id="newProductForm" class="space-y-4">
                        <!-- Form fields (name, desc, price, stock, image) -->
                        <div>
                            <label for="name" class="block text-sm font-medium text-gray-700">Product Name</label>
                            <input id="name" type="text" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                        </div>
                        <div>
                            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea id="description" rows="3" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label for="price" class="block text-sm font-medium text-gray-700">Price (₹)</label>
                                <input id="price" type="number" step="0.01" min="0" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                            </div>
                            <div>
                                <label for="stockQuantity" class="block text-sm font-medium text-gray-700">Stock</label>
                                <input id="stockQuantity" type="number" min="0" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                            </div>
                        </div>
                        <div>
                            <label for="imageUrl" class="block text-sm font-medium text-gray-700">Image URL</label>
                            <input id="imageUrl" type="text" placeholder="https://placehold.co/..." class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Categories</label>
                            <div id="category-checkbox-list" class="mt-2 space-y-2 max-h-32 overflow-y-auto border p-3 rounded-md">
                                <!-- Checkboxes will be injected here by JS -->
                            </div>
                        </div>
                        <div id="create-message" class="text-sm text-center"></div>
                        <button type="submit" class="w-full px-4 py-2 text-sm font-medium text-white bg-green-600 border border-transparent rounded-md shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                            Create Product
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- END PRODUCTS TAB -->


    <!-- Categories Tab Content -->
    <div id="categories-tab-content" class="hidden">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Left Side: Manage Existing Categories -->
            <div class="lg:w-2/3">
                <h2 class="text-2xl font-semibold mb-6">Existing Categories</h2>
                <div class="bg-white p-6 rounded-lg shadow-md overflow-x-auto">
                    <table class="w-full text-left min-w-[400px]">
                        <thead>
                        <tr class="border-b">
                            <th class="py-2">Category</th>
                            <th class="py-2">Description</th>
                            <th class="py-2">Actions</th>
                        </tr>
                        </thead>
                        <tbody id="category-list">
                        <!-- Category rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Right Side: Create New Category -->
            <div class="lg:w-1/3">
                <div class="w-full bg-white p-8 rounded-lg shadow-md sticky top-10">
                    <h2 class="text-2xl font-semibold mb-6">Create New Category</h2>
                    <form id="newCategoryForm" class="space-y-4">
                        <div>
                            <label for="cat-name" class="block text-sm font-medium text-gray-700">New Category Name</label>
                            <input id="cat-name" type="text" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                        </div>
                        <div>
                            <label for="cat-desc" class="block text-sm font-medium text-gray-700">Description (Optional)</label>
                            <input id="cat-desc" type="text" class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500">
                        </div>
                        <div id="category-message" class="text-sm text-center"></div>
                        <button type="submit" class="w-full px-4 py-2 text-sm font-medium text-white bg-green-600 border border-transparent rounded-md shadow-sm hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                            Create Category
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- END CATEGORIES TAB -->

</main>

<!-- Footer -->
<footer class="bg-gray-800 text-gray-300 py-12 mt-auto">
    <div class="container mx-auto px-4 text-center">
        <p>&copy; 2025 EcoSprout. All rights reserved.</p>
    </div>
</footer>

<!-- Edit Categories Modal -->
<div id="edit-categories-modal" class="fixed inset-0 w-full h-full items-center justify-center hidden" style="background: rgba(0, 0, 0, 0.5);">
    <div class="bg-white w-full max-w-lg p-6 rounded-lg shadow-xl m-4">
        <h2 class="text-2xl font-semibold mb-4">Edit Categories for <span id="modal-product-name" class="text-green-600"></span></h2>
        <div id="modal-category-list" class="space-y-2 max-h-48 overflow-y-auto border p-4 rounded-md">
            <!-- Modal checkboxes load here -->
        </div>
        <div id="modal-message" class="text-sm text-center my-4"></div>
        <div class="flex justify-end gap-4 mt-6">
            <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 border rounded-md hover:bg-gray-200">
                Cancel
            </button>
            <button onclick="handleUpdateProductCategories()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 border rounded-md hover:bg-blue-700">
                Save Changes
            </button>
        </div>
    </div>
</div>


<script>
    // --- JWT & Auth Management (UPDATED) ---
    const token = localStorage.getItem('ecoSproutToken');
    const authLinks = document.getElementById('auth-links');

    function parseJwt(token) {
        try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
    }
    let userRoles = [];
    if (token) {
        const tokenData = parseJwt(token);
        if (tokenData && tokenData.roles) {
            userRoles = tokenData.roles.split(',');
        }
    }
    const isAdmin = userRoles.includes('ROLE_ADMIN');

    // This block is updated to use the new Profile Icon
    if (token && isAdmin) {
        authLinks.innerHTML = `
                <a href="/admin.html" class="text-red-600 font-bold">Admin</a> <!-- Active -->
                <a href="/order_history.html" class="text-sm font-medium text-gray-600 hover:text-green-600">My Orders</a>
                <a href="/wishlist.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </a>
                <a href="/cart.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                </a>
                <a href="/profile.html" class="text-gray-600 hover:text-green-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
            `;
    } else if (token) {-
        alert('You do not have permission to view this page.');
        window.location.href = '/';
    } else {
        window.location.href = '/login.html?redirect=admin';
    }

    function logout() {
        localStorage.removeItem('ecoSproutToken');
        window.location.href = '/';
    }
    // --- End Auth ---

    // --- Admin Page Logic ---
    const globalMessageEl = document.getElementById('global-message');
    const createMessageEl = document.getElementById('create-message');
    const productListEl = document.getElementById('product-list');
    const categoryCheckboxListEl = document.getElementById('category-checkbox-list');
    const categoryListEl = document.getElementById('category-list');
    const newCategoryForm = document.getElementById('newCategoryForm');
    const categoryMessageEl = document.getElementById('category-message');

    // --- Tab Elements ---
    const productsTab = document.getElementById('products-tab-content');
    const categoriesTab = document.getElementById('categories-tab-content');
    const productsTabBtn = document.getElementById('tab-products');
    const categoriesTabBtn = document.getElementById('tab-categories');

    // --- Modal Elements ---
    const modal = document.getElementById('edit-categories-modal');
    const modalProductName = document.getElementById('modal-product-name');
    const modalCategoryList = document.getElementById('modal-category-list');
    const modalMessageEl = document.getElementById('modal-message');
    let currentEditingProductId = null;

    let allCategories = [];
    let allProducts = [];

    function showGlobalMessage(message, isError = false) {
        globalMessageEl.textContent = message;
        globalMessageEl.className = isError ? 'text-red-600 font-medium' : 'text-green-600 font-medium';
        setTimeout(() => { globalMessageEl.textContent = ''; }, 3000);
    }

    // --- Tab Switching Function ---
    function showTab(tabName) {
        if (tabName === 'products') {
            productsTab.classList.remove('hidden');
            categoriesTab.classList.add('hidden');

            productsTabBtn.classList.add('active');
            categoriesTabBtn.classList.remove('active');
        } else if (tabName === 'categories') {
            productsTab.classList.add('hidden');
            categoriesTab.classList.remove('hidden');

            productsTabBtn.classList.remove('active');
            categoriesTabBtn.classList.add('active');
        }
    }

    // --- Fetch and Display All Products ---
    function createProductRow(product) {
        const categoryNames = product.categories.map(cat => cat.name).join(', ') || 'N/A';

        return `
                <tr class="border-b" id="product-row-${product.id}">
                    <td class="py-3 pr-3">
                        <p class="font-medium">${product.name}</p>
                        <p class="text-sm text-gray-500">ID: ${product.id}</p>
                    </td>
                    <td class="py-3 pr-3">
                        <input type="number" value="${product.stockQuantity}" id="stock-input-${product.id}"
                               class="w-20 px-2 py-1 border border-gray-300 rounded-md shadow-sm">
                    </td>
                    <td class="py-3 pr-3 text-sm text-gray-600">
                        ${categoryNames}
                    </td>
                    <td class="py-3 space-x-2 whitespace-nowrap">
                        <button onclick="openModal(${product.id})" class="text-sm text-white bg-yellow-500 px-3 py-1 rounded-md hover:bg-yellow-600">Edit Cats</button>
                        <button onclick="handleUpdateStock(${product.id})" class="text-sm text-white bg-blue-500 px-3 py-1 rounded-md hover:bg-blue-600">Update</button>
                        <button onclick="handleDeleteProduct(${product.id})" class="text-sm text-white bg-red-500 px-3 py-1 rounded-md hover:bg-red-600">Delete</button>
                    </td>
                </tr>
            `;
    }
async function fetchAdminProducts() {
    try {
        const response = await fetch('/api/products', {
            headers: {
                'Authorization': `Bearer ${token}`, // Added Token
                'Content-Type': 'application/json'
            }
        });
        if (!response.ok) throw new Error('Failed to fetch product list');
        allProducts = await response.json();

        productListEl.innerHTML = '';
        allProducts.forEach(product => {
            productListEl.innerHTML += createProductRow(product);
        });
    } catch (error) {
        console.error('Fetch products error:', error);
    }
}


    // --- Fetch Categories for ALL lists ---
    function createCategoryRow(category) {
        return `
                <tr id="cat-manage-${category.id}" class="border-b">
                    <td class="py-3 pr-3">
                        <input id="cat-edit-name-${category.id}" type="text" value="${category.name}" class="text-sm p-1 border border-gray-200 rounded-md w-full"/>
                    </td>
                    <td class="py-3 pr-3">
                        <input id="cat-edit-desc-${category.id}" type="text" value="${category.description || ''}" placeholder="No description" class="text-sm p-1 border border-gray-200 rounded-md w-full"/>
                    </td>
                    <td class="py-3 space-x-2 whitespace-nowrap">
                        <button onclick="handleUpdateCategory(${category.id})" class="text-sm text-white bg-blue-500 px-3 py-1 rounded-md hover:bg-blue-600">Save</button>
                        <button onclick="handleDeleteCategory(${category.id})" class="text-sm text-white bg-red-500 px-3 py-1 rounded-md hover:bg-red-600">Delete</button>
                    </td>
                </tr>
            `;
    }

async function fetchCategories() {
    try {
        const response = await fetch('/api/categories', {
            headers: {
                'Authorization': `Bearer ${token}`, // Added Token
                'Content-Type': 'application/json'
            }
        });
        if (!response.ok) throw new Error('Failed to fetch categories');
        allCategories = await response.json();

        categoryCheckboxListEl.innerHTML = '';
            categoryListEl.innerHTML = '';

            if (allCategories.length > 0) {
                allCategories.forEach(category => {
                    // Populate "Create Product" form
                    categoryCheckboxListEl.innerHTML += `
                            <div class="flex items-center">
                                <input id="cat-create-${category.id}" name="categoryIds" value="${category.id}" type="checkbox"
                                       class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                                <label for="cat-create-${category.id}" class="ml-3 text-sm text-gray-700">${category.name}</label>
                            </div>
                        `;
                    // Populate "Manage Categories" list
                    categoryListEl.innerHTML += createCategoryRow(category);
                });
            } else {
                categoryCheckboxListEl.innerHTML = '<p class="text-gray-500 text-sm">No categories found. Create one first!</p>';
                categoryListEl.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-gray-500">No categories found.</td></tr>';
            }
        // ... rest of your existing logic to populate checkboxes ...
    } catch (error) {
        console.error('Fetch categories error:', error);
    }
}

    // --- Handle Create Product ---
    document.getElementById('newProductForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        const selectedCategoryCheckboxes = document.querySelectorAll('#category-checkbox-list input[name="categoryIds"]:checked');
        const categoryIds = Array.from(selectedCategoryCheckboxes).map(cb => parseInt(cb.value));
        const payload = {
            name: document.getElementById('name').value,
            description: document.getElementById('description').value,
            price: parseFloat(document.getElementById('price').value),
            stockQuantity: parseInt(document.getElementById('stockQuantity').value),
            imageUrl: document.getElementById('imageUrl').value || 'https://placehold.co/600x600/e2e8f0/94a3b8?text=EcoSprout',
            categoryIds: categoryIds
        };
        createMessageEl.textContent = 'Creating product...';
        createMessageEl.className = 'text-blue-600';
        try {
            const response = await fetch('/api/admin/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                createMessageEl.textContent = 'Product created successfully!';
                createMessageEl.className = 'text-green-600';
                document.getElementById('newProductForm').reset();
                fetchAdminProducts(); // Refresh the product list
            } else {
                const errorBody = await response.json();
                throw new Error(errorBody.message || 'Failed to create product.');
            }
        } catch (error) {
            console.error('Create product error:', error);
            createMessageEl.textContent = `Error: ${error.message}`;
            createMessageEl.className = 'text-red-600';
        }
    });

    // --- Handle Update Stock ---
    async function handleUpdateStock(productId) {
        const stockInput = document.getElementById(`stock-input-${productId}`);
        const newQuantity = parseInt(stockInput.value);
        if (isNaN(newQuantity) || newQuantity < 0) {
            showGlobalMessage('Invalid stock quantity.', true);
            return;
        }
        try {
            const response = await fetch(`/api/admin/products/${productId}/stock`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ quantity: newQuantity })
            });
            if (response.ok) {
                showGlobalMessage(`Stock for product #${productId} updated to ${newQuantity}.`, false);
            } else { throw new Error('Failed to update stock.'); }
        } catch (error) {
            console.error('Update stock error:', error);
            showGlobalMessage('Error updating stock.', true);
        }
    }

    // --- Handle Delete Product ---
    async function handleDeleteProduct(productId) {
        if (!confirm(`Are you sure you want to delete product #${productId}? This cannot be undone.`)) {
            return;
        }
        try {
            const response = await fetch(`/api/admin/products/${productId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                showGlobalMessage(`Product #${productId} successfully deleted.`, false);
                document.getElementById(`product-row-${productId}`).remove();
            } else {
                const errorBody = await response.json();
                throw new Error(errorBody.message || 'Failed to delete product.');
            }
        } catch (error) {
            console.error('Delete product error:', error);
            showGlobalMessage(`Error: ${error.message}`, true);
        }
    }

    // --- Category Management Functions ---
    newCategoryForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        const name = document.getElementById('cat-name').value;
        const description = document.getElementById('cat-desc').value;
        categoryMessageEl.textContent = 'Creating...';
        categoryMessageEl.className = 'text-blue-600';
        try {
            const response = await fetch('/api/admin/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, description })
            });
            if (response.ok) {
                categoryMessageEl.textContent = 'Category created!';
                categoryMessageEl.className = 'text-green-600';
                newCategoryForm.reset();
                fetchCategories();
            } else {
                const error = await response.json();
                throw new Error(error.message || 'Failed to create');
            }
        } catch (error) {
            categoryMessageEl.textContent = `Error: ${error.message}`;
            categoryMessageEl.className = 'text-red-600';
        }
    });

    async function handleUpdateCategory(categoryId) {
        const name = document.getElementById(`cat-edit-name-${categoryId}`).value;
        const description = document.getElementById(`cat-edit-desc-${categoryId}`).value;
        try {
            const response = await fetch(`/api/admin/categories/${categoryId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, description })
            });
            if (response.ok) {
                showGlobalMessage(`Category #${categoryId} updated.`, false);
                fetchCategories();
                fetchAdminProducts();
            } else {
                const error = await response.json();
                throw new Error(error.message);
            }
        } catch (error) {
            showGlobalMessage(`Error: ${error.message}`, true);
        }
    }

    async function handleDeleteCategory(categoryId) {
        if (!confirm(`Are you sure you want to delete category #${categoryId}? This will NOT delete its products, but will unlink them.`)) {
            return;
        }
        try {
            const response = await fetch(`/api/admin/categories/${categoryId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                showGlobalMessage(`Category #${categoryId} deleted.`, false);
                fetchCategories();
                fetchAdminProducts();
            } else {
                const error = await response.json();
                throw new Error(error.message);
            }
        } catch (error) {
            showGlobalMessage(`Error: ${error.message}`, true);
        }
    }

    // --- Modal Functions ---
    function openModal(productId) {
        currentEditingProductId = productId;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        modalProductName.textContent = product.name;
        modalCategoryList.innerHTML = '';
        const productCategoryIds = product.categories.map(c => c.id);
        allCategories.forEach(category => {
            const isChecked = productCategoryIds.includes(category.id) ? 'checked' : '';
            modalCategoryList.innerHTML += `
                    <div class="flex items-center">
                        <input id="modal-cat-${category.id}" name="modalCategoryIds" value="${category.id}" type="checkbox" ${isChecked}
                               class="h-4 w-4 text-green-600 border-gray-300 rounded focus:ring-green-500">
                        <label for="modal-cat-${category.id}" class="ml-3 text-sm text-gray-700">${category.name}</label>
                    </div>
                `;
        });
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        currentEditingProductId = null;
        modalMessageEl.textContent = '';
    }

    async function handleUpdateProductCategories() {
        if (!currentEditingProductId) return;
        const selectedCheckboxes = document.querySelectorAll('#modal-category-list input[name="modalCategoryIds"]:checked');
        const categoryIds = Array.from(selectedCheckboxes).map(cb => parseInt(cb.value));
        modalMessageEl.textContent = 'Saving...';
        modalMessageEl.className = 'text-blue-600';
        try {
            const response = await fetch(`/api/admin/products/${currentEditingProductId}/categories`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ categoryIds })
            });
            if (response.ok) {
                modalMessageEl.textContent = 'Saved successfully!';
                modalMessageEl.className = 'text-green-600';
                fetchAdminProducts(); // Refresh product list in the background
                setTimeout(closeModal, 1000);
            } else {
                throw new Error('Failed to save categories');
            }
        } catch (error) {
            modalMessageEl.textContent = `Error: ${error.message}`;
            modalMessageEl.className = 'text-red-600';
        }
    }

    // --- Initial Load ---
    document.addEventListener('DOMContentLoaded', () => {
        fetchAdminProducts(); // Load the product list
        fetchCategories();    // Load the categories for all forms/lists
    });
</script>
</body>
</html>
