name: Java CI/CD with Maven and PostgreSQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ecomerce
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hari@123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ecomerce
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: hari@123
      run: mvn -B clean package

    # Trigger Render deployment via Deploy Hook URL
    # Add RENDER_DEPLOY_HOOK_URL as a GitHub Secret
    - name: Trigger Render Deployment
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" > /dev/null
        echo "Render deployment triggered."
