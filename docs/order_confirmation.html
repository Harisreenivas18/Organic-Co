<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - EcoSprout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
<script src="/config.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-lg p-10 text-center bg-white rounded-lg shadow-md">
    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-green-500 mb-6">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="16 12 12 16 8 12"></polyline>
        <line x1="12" y1="8" x2="12" y2="16"></line>
    </svg>

    <h1 class="text-3xl font-bold text-gray-900">Thank you for your order!</h1>
    <p class="mt-3 text-lg text-gray-600">
        Your order has been placed successfully.
    </p>
    <p class="mt-2 text-gray-500">
        Your Order ID is: <span id="order-id" class="font-medium text-gray-800">...</span>
    </p>

    <a href="/"
       class="w-full mt-8 inline-block bg-green-600 text-white text-lg font-medium px-8 py-3 rounded-md shadow-lg hover:bg-green-700 transition-colors">
        Continue Shopping
    </a>
</div>

<script>
    // Get the order ID from the URL query parameter
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId');

        const orderIdEl = document.getElementById('order-id');
        if (orderId) {
            orderIdEl.textContent = orderId;
        } else {
            orderIdEl.textContent = "N/A";
        }
    });
</script>
</body>
</html>
